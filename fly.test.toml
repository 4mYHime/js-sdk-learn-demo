# fly.toml — 测试环境配置
# 部署命令: fly deploy --config fly.test.toml

app = 'narration-video-demo-test'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.http_options]
    idle_timeout = 300

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2048mb'
  cpus = 1
  memory_mb = 2048
