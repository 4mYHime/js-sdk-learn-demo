# fly.toml app configuration file generated for narration-video-demo on 2026-03-05T11:16:50+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'narration-video-demo'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.http_options]
    idle_timeout = 300

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2048mb'
  cpus = 1
  memory_mb = 2048
