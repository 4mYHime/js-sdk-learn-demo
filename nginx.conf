server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理（对应 vite.config.js 中的 proxy 规则）
    # 轻量查询接口（默认超时即可）
    location /api/movies/ {
        proxy_pass https://rt6xvm5qvr.coze.site/;
        proxy_set_header Host rt6xvm5qvr.coze.site;
        proxy_ssl_server_name on;
    }

    location /api/templates/ {
        proxy_pass https://y2jtqf58bf.coze.site/;
        proxy_set_header Host y2jtqf58bf.coze.site;
        proxy_ssl_server_name on;
    }

    location /api/bgm/ {
        proxy_pass https://2b7tgw8s7h.coze.site/;
        proxy_set_header Host 2b7tgw8s7h.coze.site;
        proxy_ssl_server_name on;
    }

    location /api/dubbing/ {
        proxy_pass https://4cnpfpw2q7.coze.site/;
        proxy_set_header Host 4cnpfpw2q7.coze.site;
        proxy_ssl_server_name on;
    }

    location /api/status/ {
        proxy_pass https://fnd4r5gvww.coze.site/;
        proxy_set_header Host fnd4r5gvww.coze.site;
        proxy_ssl_server_name on;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
    }

    location /api/cloud_files/ {
        proxy_pass https://m83sqwjvdv.coze.site/;
        proxy_set_header Host m83sqwjvdv.coze.site;
        proxy_ssl_server_name on;
    }

    location /api/v2/ {
        proxy_pass https://openapi.jieshuo.cn/v2/;
        proxy_set_header Host openapi.jieshuo.cn;
        proxy_ssl_server_name on;
    }

    # 重计算接口：生成文案/剪辑/视频/爆款模型，后端处理耗时长，超时设为 300s
    location /api/script/ {
        proxy_pass https://fhwpnktkcp.coze.site/;
        proxy_set_header Host fhwpnktkcp.coze.site;
        proxy_ssl_server_name on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    location /api/clip/ {
        proxy_pass https://wsk44rd4dv.coze.site/;
        proxy_set_header Host wsk44rd4dv.coze.site;
        proxy_ssl_server_name on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    location /api/video/ {
        proxy_pass https://q77shf4jhf.coze.site/;
        proxy_set_header Host q77shf4jhf.coze.site;
        proxy_ssl_server_name on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    location /api/viral_learn/ {
        proxy_pass https://s6zrzf9gxs.coze.site/;
        proxy_set_header Host s6zrzf9gxs.coze.site;
        proxy_ssl_server_name on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    # 文件上传相关接口
    location /api/pre_upload/ {
