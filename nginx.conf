        proxy_set_header Host v6ztd4tn4r.coze.site;
        proxy_ssl_server_name on;
    }

    location /api/delete_file/ {
        proxy_pass https://hptt42558m.coze.site/;
        proxy_set_header Host hptt42558m.coze.site;
        proxy_ssl_server_name on;
    }
